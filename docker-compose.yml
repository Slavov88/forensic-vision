version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-forensicvision}
      POSTGRES_USER:     ${DB_USER:-forensicvision}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forensicvision}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-forensicvision}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django Web ─────────────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST:   db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - mediafiles:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:   db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - mediafiles:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A forensicvision worker
        --loglevel=info
        --concurrency=2
        -Q celery

volumes:
  pgdata:
  mediafiles:
